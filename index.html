<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoloContact v1.0</title>
    
    <style>
        /* --- 1. CORE STYLES & ANIMATIONS --- */
        :root {
            --bg-color: #000212;
            --holo-cyan: #0fffd2;
            --holo-magenta: #f0f;
            --holo-blue: #0ae;
            --text-color: #fff;
            --panel-bg: rgba(16, 24, 60, 0.4);
            --border-color: rgba(0, 255, 210, 0.3);
            --transition: all 0.3s ease-out;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        @keyframes holo-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: var(--font-main);
            color: var(--text-color);
            background: linear-gradient(-45deg, #000, #001242, #100, #000);
            background-size: 400% 400%;
            animation: holo-bg 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- 2. THE MAIN HOLOGRAPHIC CONTAINER --- */
        .main-container {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            width: 600px;
            position: relative;
            border: 1px solid var(--border-color);
            box-shadow: 0 0 15px rgba(0, 255, 210, 0.1);
            transform: perspective(1000px) rotateX(2deg) rotateY(-1deg);
            transition: var(--transition);
        }

        .main-container:hover {
            transform: perspective(1000px) rotateX(0deg) rotateY(0deg);
            box-shadow: 0 0 25px rgba(0, 255, 210, 0.2), 0 0 50px rgba(255, 0, 255, 0.1);
        }

        h1 {
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            color: var(--holo-cyan);
            text-shadow: 0 0 10px var(--holo-cyan);
            margin-bottom: 30px;
        }

        /* --- 3. FORM & INPUTS --- */
        .form-group {
           display: flex;
           flex-direction: column;
           gap: 15px;
           margin-bottom: 25px;
        }

        input {
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 210, 0.2);
            color: #fff;
            border-radius: 8px;
            transition: var(--transition);
        }

        input:focus {
            outline: none;
            border-color: var(--holo-magenta);
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        button {
            padding: 12px 20px;
            background: transparent;
            cursor: pointer;
            border-radius: 8px;
            text-transform: uppercase;
            font-weight: bold;
            transition: var(--transition);
        }

        .btn-add {
            border: 2px solid var(--holo-cyan);
            color: var(--holo-cyan);
            width: 100%;
        }

        .btn-add:hover {
            background: var(--holo-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--holo-cyan);
        }

        .btn-delete {
            border: 1px solid var(--holo-magenta);
            color: var(--holo-magenta);
            font-size: 0.7rem;
            padding: 5px 10px;
        }

        .btn-delete:hover {
            background: var(--holo-magenta);
            color: #fff;
        }

        /* --- 4. LIST ITEMS --- */
        ul {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        li {
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(0, 255, 210, 0.1);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: var(--transition);
        }

        li:hover {
            transform: translateX(5px);
            background: rgba(0, 255, 210, 0.05);
        }

        .contact-info { display: flex; flex-direction: column; }
        .contact-name { font-size: 1.1rem; color: #fff; }
        .contact-email { font-size: 0.9rem; color: rgba(255, 255, 255, 0.6); }

    </style>
</head>
<body>

    <div class="main-container">
        <h1>HoloContact v1.0</h1>
        
        <div class="form-group">
            <input type="text" id="name" placeholder="IDENTIFIER (NAME)">
            <input type="email" id="email" placeholder="COMMS ADDRESS (EMAIL)">
            <button class="btn-add" onclick="addContact()">Commit</button>
        </div>

        <ul id="contactList">
            </ul>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api/contacts';

        // Load and Render Contacts
        async function loadContacts() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Server Error");
                
                const data = await response.json();
                const list = document.getElementById('contactList');
                list.innerHTML = ''; 
                
                data.forEach(contact => {
                    list.innerHTML += `
                        <li>
                            <div class="contact-info">
                                <span class="contact-name">${contact.name}</span>
                                <span class="contact-email">${contact.email}</span>
                            </div>
                            <button class="btn-delete" onclick="deleteContact('${contact.id}')">Purge</button>
                        </li>`;
                });
            } catch (error) {
                console.error("Connection Lost: ", error);
                document.getElementById('contactList').innerHTML = 
                    "<li style='color: #f55;'>[ERROR] DATALINK OFFLINE</li>";
            }
        }

        // Add a new Contact
        async function addContact() {
            const nameEl = document.getElementById('name');
            const emailEl = document.getElementById('email');

            if(!nameEl.value || !emailEl.value) { 
                alert("Missing parameters."); 
                return; 
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: nameEl.value, email: emailEl.value })
                });

                if(response.ok) {
                    nameEl.value = '';
                    emailEl.value = '';
                    loadContacts();
                }
            } catch (err) {
                console.error("Failed to commit data", err);
            }
        }

        // Delete a Contact
        async function deleteContact(id) {
            try {
                const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if(response.ok) {
                    loadContacts(); // Only reload if server confirmed delete
                } else {
                    alert("Purge failed on server.");
                }
            } catch (err) {
                console.error("Purge Error:", err);
            }
        }

        // Initial Load
        loadContacts();
    </script>
</body>
</html>
