<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoloContact v1.0</title>
    
    <style>
        /* --- 1. CORE STYLES & ANIMATIONS --- */
        :root {
            /* Holographic Color Palette */
            --bg-color: #000212;
            --holo-cyan: #0fffd2;
            --holo-magenta: #f0f;
            --holo-blue: #0ae;
            --text-color: #fff;
            --panel-bg: rgba(16, 24, 60, 0.4); /* Transparent glass effect */
            --border-color: rgba(0, 255, 210, 0.3);
            --transition: all 0.3s ease-out;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Moving Gradient Background Animation */
        @keyframes holo-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: var(--font-main);
            color: var(--text-color);
            background: linear-gradient(-45deg, #000, #001242, #100, #000);
            background-size: 400% 400%;
            animation: holo-bg 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- 2. THE MAIN HOLOGRAPHIC CONTAINER --- */
        .main-container {
            background: var(--panel-bg);
            transform: perspective(1000px) rotateX(0.5deg) rotateY(-0.2deg);
    padding: 40px;
    border-radius: 20px;
    width: 700px; /* Increased from 500px to 700px */
    position: relative;
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 20px;
            width: 500px;
            position: relative;
            
            /* Glassmorphism Filters */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            
            /* The 3D and Glow Effect */
            border: 1px solid var(--border-color);
            box-shadow: 
                0 0 15px rgba(0, 255, 210, 0.1),
                0 0 30px rgba(0, 255, 210, 0.1),
                inset 0 0 15px rgba(255, 0, 255, 0.1);
            
            /* Slight tilt for 3D perspective */
            transform: perspective(1000px) rotateX(2deg) rotateY(-1deg);
            transition: var(--transition);
        }

        .main-container:hover {
            transform: perspective(1000px) rotateX(0deg) rotateY(0deg);
    box-shadow: 0 0 20px rgba(0, 255, 210, 0.15);
            transform: perspective(1000px) rotateX(0deg) rotateY(0deg);
            box-shadow: 
                0 0 25px rgba(0, 255, 210, 0.2),
                0 0 50px rgba(255, 0, 255, 0.1);
        }

        /* --- 3. TYPOGRAPHY --- */
        h1 {
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            color: var(--holo-cyan);
            text-shadow: 0 0 10px var(--holo-cyan), 0 0 20px var(--holo-cyan);
            margin-bottom: 30px;
        }

        /* --- 4. INPUTS & FORM (Holo-Input Style) --- */
        .form-group {
           display: flex;
           flex-direction: column; /* Stack them vertically for a cleaner 3D look */
            gap: 15px;
             margin-bottom: 25px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 210, 0.2);
            color: #fff;
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
        }

        input::placeholder { color: rgba(255, 255, 255, 0.5); }

        input:focus {
            outline: none;
            border-color: var(--holo-magenta);
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
            background: rgba(255, 0, 255, 0.05);
        }

        /* --- 5. BUTTONS (Holo-Button Style) --- */
        button {
            padding: 12px 20px;
            background: transparent;
            cursor: pointer;
            border-radius: 8px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            transition: var(--transition);
        }

        /* The Add Button */
        .btn-add {
            border: 2px solid var(--holo-cyan);
            color: var(--holo-cyan);
            text-shadow: 0 0 5px var(--holo-cyan);
            btn-add {
    width: 100%; 
    
    
    
}
        }

        .btn-add:hover {
            background: var(--holo-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--holo-cyan), 0 0 40px var(--holo-cyan);
        }

        /* The Delete Button */
        .btn-delete {
            border: 1px solid var(--holo-magenta);
            color: var(--holo-magenta);
            font-size: 0.8rem;
            padding: 5px 10px;
        }

        .btn-delete:hover {
            background: var(--holo-magenta);
            color: #fff;
            box-shadow: 0 0 10px var(--holo-magenta);
        }

        /* --- 6. CONTACT LIST & DATA ITEMS --- */
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 300px;
            overflow-y: auto; /* Scrollable if many contacts */
            padding-right: 10px;
        }

        /* Custom Scrollbar for Holo look */
        ul::-webkit-scrollbar { width: 5px; }
        ul::-webkit-scrollbar-thumb { background: var(--holo-cyan); border-radius: 5px; }

        li {
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(0, 255, 210, 0.1);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: var(--transition);
        }

        li:hover {
            background: rgba(0, 255, 210, 0.05);
            border-color: rgba(0, 255, 210, 0.3);
            transform: translateX(5px);
        }

        .contact-info {
            display: flex;
            flex-direction: column;
        }

        .contact-name {
            font-size: 1.1rem;
            color: #fff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .contact-email {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Final Scanline Effect (Optional overlay) */
        .main-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.05),
                rgba(0, 0, 0, 0.05) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none; /* Let clicks pass through */
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>HoloContact v1.0</h1>
        
        <div class="form-group">
            <input type="text" id="name" placeholder="IDENTIFIER (NAME)">
            <input type="email" id="email" placeholder="COMMS ADDRESS (EMAIL)">
            <button class="btn-add" onclick="addContact()">Commit</button>
        </div>

        <ul id="contactList">
            </ul>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api/contacts';

        async function loadContacts() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const list = document.getElementById('contactList');
                list.innerHTML = ''; 
                
                data.forEach(contact => {
                    list.innerHTML += `
                        <li>
                            <div class="contact-info">
                                <span class="contact-name">${contact.name}</span>
                                <span class="contact-email">${contact.email}</span>
                            </div>
                            <button class="btn-delete" onclick="deleteContact('${contact.id}')">Purge</button>
                        </li>`;
                });
            } catch (error) {
                console.error("Backend offline? ", error);
                document.getElementById('contactList').innerHTML = 
                    "<li style='color: #f55; border-color: #f55;'>[ERROR] BACKEND OFFLINE</li>";
            }
        }

        async function addContact() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;

            // Simple validation
            if(!name || !email) { alert("Data entry required."); return; }

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email })
            });
            
            // Clear inputs
            document.getElementById('name').value = '';
            document.getElementById('email').value = '';
            
            loadContacts();
        }

        async function deleteContact(id) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            loadContacts();
        }
        data.forEach(contact => {
    // 🚨 Check if contact exists and has a name before trying to render it
    if (contact && contact.name) {
        list.innerHTML += `
            <li>
                <div class="contact-info">
                    <span class="contact-name">${contact.name}</span>
                    <span class="contact-email">${contact.email || 'No Email'}</span>
                </div>
                <button class="btn-delete" onclick="deleteContact('${contact.id}')">Purge</button>
            </li>`;
    }
});

        // Initialize connection
        loadContacts();
    </script>
</body>
</html>
